apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "health-reporter.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "health-reporter.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  
  selector:
    matchLabels:
      {{- include "health-reporter.selectorLabels" . | nindent 6 }}
  
  template:
    metadata:
      labels:
        {{- include "health-reporter.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      containers:
      - name: health-reporter
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        args:
          - "--config"
          - "/etc/health-reporter/config.yaml"
          - "--interval"
          - {{ .Values.reporting.interval | quote }}
          {{- if .Values.logging.verbose }}
          - "--verbose"
          {{- end }}
        
        env:
        - name: DISCORD_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.discord.webhookSecret }}
              key: webhook-url
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        
        volumeMounts:
        - name: config
          mountPath: /etc/health-reporter
          readOnly: true
        
        livenessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pgrep -f health-reporter
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        
        readinessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pgrep -f health-reporter
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
      
      volumes:
      - name: config
        configMap:
          name: {{ include "health-reporter.fullname" . }}-config
