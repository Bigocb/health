{{- if eq .Values.mode "deployment" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "health-reporter.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "health-reporter.name" . }}
    chart: {{ include "health-reporter.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  strategy:
    {{- toYaml .Values.deployment.strategy | nindent 4 }}
  
  selector:
    matchLabels:
      app: {{ include "health-reporter.name" . }}
      release: {{ .Release.Name }}
  
  template:
    metadata:
      labels:
        app: {{ include "health-reporter.name" . }}
        release: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      
      containers:
      - name: health-reporter
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        args:
          - "--config"
          - "/etc/health-reporter/config.yaml"
          - "--interval"
          - "1h"
          {{- if .Values.logging.verbose }}
          - "--verbose"
          {{- end }}
        
        env:
        - name: DISCORD_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.discord.webhookSecret }}
              key: webhook-url
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        
        resources:
          {{- toYaml .Values.deployment.resources | nindent 12 }}
        
        volumeMounts:
        - name: config
          mountPath: /etc/health-reporter
          readOnly: true
        {{- range .Values.volumeMounts }}
        - {{- toYaml . | nindent 12 }}
        {{- end }}
      
      volumes:
      - name: config
        configMap:
          name: {{ include "health-reporter.fullname" . }}-config
      {{- range .Values.volumes }}
      - {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
