{{- if eq .Values.mode "cron" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "health-reporter.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "health-reporter.name" . }}
    chart: {{ include "health-reporter.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  # Hourly schedule (top of each hour)
  schedule: {{ .Values.scheduling.schedule | quote }}
  startingDeadlineSeconds: {{ .Values.scheduling.startingDeadlineSeconds }}
  concurrencyPolicy: {{ .Values.scheduling.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.scheduling.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.scheduling.failedJobsHistoryLimit }}
  
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: {{ include "health-reporter.name" . }}
            release: {{ .Release.Name }}
          annotations:
            checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        
        spec:
          serviceAccountName: {{ .Values.serviceAccount.name }}
          restartPolicy: OnFailure
          {{- if .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if .Values.tolerations }}
          tolerations:
            {{- toYaml .Values.tolerations | nindent 12 }}
          {{- end }}
          {{- if .Values.affinity }}
          affinity:
            {{- toYaml .Values.affinity | nindent 12 }}
          {{- end }}
          
          containers:
          - name: health-reporter
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            
            args:
              - "--config"
              - "/etc/health-reporter/config.yaml"
              - "--once"
              {{- if .Values.logging.verbose }}
              - "--verbose"
              {{- end }}
            
            env:
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.discord.webhookSecret }}
                  key: webhook-url
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            
            resources:
              {{- toYaml .Values.deployment.resources | nindent 14 }}
            
            volumeMounts:
            - name: config
              mountPath: /etc/health-reporter
              readOnly: true
            {{- range .Values.volumeMounts }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
          
          volumes:
          - name: config
            configMap:
              name: {{ include "health-reporter.fullname" . }}-config
          {{- range .Values.volumes }}
          - {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
