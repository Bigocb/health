{{- if .Values.discord.webhookUrl }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.discord.webhookSecret }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "health-reporter.name" . }}
    chart: {{ include "health-reporter.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
type: Opaque
data:
  # Base64-encoded Discord webhook URL (only created if webhookUrl is provided)
  webhook-url: {{ .Values.discord.webhookUrl | b64enc | quote }}
{{- end }}
