{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "health-reporter.fullname" . }}
  labels:
    app: {{ include "health-reporter.name" . }}
    chart: {{ include "health-reporter.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
rules:
# Read nodes
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]

# Read pods
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

# Read pod logs (for debugging)
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]

# Read events
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

# Read namespaces (for cluster info)
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]

# Read persistent volumes (future: disk monitoring)
- apiGroups: [""]
  resources: ["persistentvolumes", "persistentvolumeclaims"]
  verbs: ["get", "list"]

# Read metrics (if needed)
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]

# SmokeTest CRD (controller permissions)
- apiGroups: ["health.archipelago.ai"]
  resources: ["smoketests"]
  verbs: ["get", "list", "watch"]

- apiGroups: ["health.archipelago.ai"]
  resources: ["smoketests/status"]
  verbs: ["get", "patch", "update"]

- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
{{- end }}
