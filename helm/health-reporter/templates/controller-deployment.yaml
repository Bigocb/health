{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "health-reporter.fullname" . }}-controller
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "health-reporter.name" . }}-controller
    chart: {{ include "health-reporter.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.controller.replicas }}
  
  selector:
    matchLabels:
      app: {{ include "health-reporter.name" . }}-controller
      release: {{ .Release.Name }}
  
  template:
    metadata:
      labels:
        app: {{ include "health-reporter.name" . }}-controller
        release: {{ .Release.Name }}
    
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      
      containers:
      - name: controller
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        args:
          - "--skip-controller=false"
          {{- if .Values.logging.verbose }}
          - "--verbose"
          {{- end }}
        
        env:
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        
        resources:
          {{- toYaml .Values.controller.resources | nindent 12 }}
        
        livenessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - ps aux | grep -q "[h]ealth-reporter.*--skip-controller=false" && echo ok
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
{{- end }}
