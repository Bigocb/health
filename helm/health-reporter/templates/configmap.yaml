apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "health-reporter.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "health-reporter.name" . }}
    chart: {{ include "health-reporter.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
data:
  config.yaml: |
    mimir:
      url: {{ .Values.mimir.url | quote }}
      {{- if .Values.mimir.username }}
      username: {{ .Values.mimir.username | quote }}
      {{- end }}
      {{- if .Values.mimir.password }}
      password: {{ .Values.mimir.password | quote }}
      {{- end }}
    
    {{- if .Values.loki.url }}
    loki:
      url: {{ .Values.loki.url | quote }}
      {{- if .Values.loki.username }}
      username: {{ .Values.loki.username | quote }}
      {{- end }}
      {{- if .Values.loki.password }}
      password: {{ .Values.loki.password | quote }}
      {{- end }}
    {{- end }}
    
    discord: {}
    
    health:
      cpu_threshold: {{ .Values.health.cpuThreshold }}
      memory_threshold: {{ .Values.health.memoryThreshold }}
      disk_threshold: {{ .Values.health.diskThreshold }}
      restart_limit: {{ .Values.health.restartLimit }}
    
    storage:
      reports_directory: "/var/lib/health-reporter/reports"
      retention_hours: {{ .Values.storage.retentionHours }}
    
    analysis:
      enabled: {{ .Values.analysis.enabled }}
      timeout_seconds: {{ .Values.analysis.timeoutSeconds }}
      trends:
        window_hours: {{ .Values.analysis.trends.windowHours }}
        anomaly_threshold: {{ .Values.analysis.trends.anomalyThreshold }}
        min_data_points: {{ .Values.analysis.trends.minDataPoints }}
      llm:
        enabled: {{ .Values.analysis.llm.enabled }}
        provider: {{ .Values.analysis.llm.provider | quote }}
        model: {{ .Values.analysis.llm.model | quote }}
        endpoint: {{ .Values.analysis.llm.endpoint | quote }}
        timeout_seconds: {{ .Values.analysis.llm.timeoutSeconds }}
        max_retries: {{ .Values.analysis.llm.maxRetries }}
        {{- if .Values.analysis.llm.temperature }}
        temperature: {{ .Values.analysis.llm.temperature }}
        {{- end }}
        {{- if .Values.analysis.llm.maxTokens }}
        max_tokens: {{ .Values.analysis.llm.maxTokens }}
        {{- end }}
        {{- if .Values.analysis.llm.phase2Model }}
        phase2_model: {{ .Values.analysis.llm.phase2Model | quote }}
        {{- end }}
