# Health Reporter Helm Chart Values

# Global namespace
namespace: monitoring

# Docker image configuration
image:
  repository: ghcr.io/bigocb/health
  tag: latest
  pullPolicy: Always

# CRD Configuration
crd:
  # Install CRD (only needed on first install)
  install: true

# Controller Configuration
controller:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# Mimir configuration
mimir:
  url: "http://mimir-nginx.monitoring.svc.cluster.local:80/prometheus"
  username: ""
  password: ""

# Discord webhook configuration
discord:
  # Discord webhook URL - set via helm install -set discord.webhookUrl="https://..."
  # or via --values with secret reference
  webhookUrl: ""
  webhookSecret: "health-report-webhook"  # Name of secret storing webhook URL (existing secret in cluster)

# Health thresholds
health:
  cpuThreshold: 80
  memoryThreshold: 85
  diskThreshold: 90
  restartLimit: 5

# Deployment configuration
deployment:
  replicas: 1
  strategy:
    type: Recreate  # CronJob needs Recreate, not RollingUpdate
  
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  
  # Pod disruption budget
  podDisruptionBudget:
    enabled: false
    minAvailable: 0

# Scheduling
scheduling:
  # Run hourly at top of hour
  schedule: "0 * * * *"
  
  # Time to wait for job to complete
  startingDeadlineSeconds: 60
  
  # Concurrency policy
  concurrencyPolicy: Forbid
  
  # Successful jobs to keep
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

# CronJob or Deployment mode
mode: "cron"  # Can be "cron" or "deployment" (for testing)

# Service Account
serviceAccount:
  create: true
  name: health-reporter
  automountServiceAccountToken: true

# RBAC
rbac:
  create: true

# Node selection
nodeSelector: {}

# Tolerations
tolerations: []

# Pod affinity
affinity: {}

# Environment variables
env: {}
  # Additional environment variables can be set here

# Logging
logging:
  verbose: false

# Smoke Tests - Example sample tests to install
smokeTests:
  # Uncomment to enable sample tests
  # - name: kubernetes-dns
  #   type: dns
  #   severity: high
  #   domain: kubernetes.default
  # - name: kubernetes-api
  #   type: http
  #   severity: critical
  #   url: https://kubernetes.default:443/livez
  #   expectedStatus: 200
  # - name: etcd-tcp
  #   type: tcp
  #   severity: critical
  #   host: etcd.default
  #   port: 2379

# Volume mounts (for future use)
volumeMounts: []

# Volumes (for future use)
volumes: []
