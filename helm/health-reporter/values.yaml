# Health Reporter Helm Chart Values
# Single deployment: runs CRD controller + periodic health reports in one process.

# Global namespace
namespace: monitoring

# Docker image configuration
image:
  repository: ghcr.io/bigocb/health
  tag: latest
  pullPolicy: Always

# CRD Configuration
crd:
  install: true

# Reporting schedule (Go duration format)
reporting:
  interval: "1h"

# Mimir configuration
mimir:
  url: "http://mimir-nginx.monitoring.svc.cluster.local:80/prometheus"
  username: ""
  password: ""

# Loki configuration (optional - for log analysis)
loki:
  url: "http://loki.monitoring.svc.cluster.local:3100"
  username: ""
  password: ""

# Discord webhook configuration
discord:
  webhookUrl: ""
  webhookSecret: "health-report-webhook"

# Health thresholds
health:
  cpuThreshold: 80
  memoryThreshold: 85
  diskThreshold: 90
  restartLimit: 5

# Storage configuration
storage:
  retentionHours: 168  # Keep 7 days of reports
  pvc:
    create: true  # Use PVC for persistent report storage
    size: 1Gi
    storageClass: ""  # Use default storage class

# Cache configuration (enriched data for async analysis)
cache:
  enabled: true
  collectionIntervalSeconds: 300  # 5 minutes - steady, predictable collection
  maxLogEntries: 10000            # Max error entries across all pods
  maxCacheAgeHours: 1             # Keep data for 1 hour (reduces memory growth)
  maxMemoryMB: 300                # Hard limit on cache size

# Analysis configuration
analysis:
  enabled: true
  timeoutSeconds: 360  # 6 minutes to allow for slow LLM inference
  trends:
    windowHours: 24
    anomalyThreshold: 1.5
    minDataPoints: 6
  llm:
    enabled: true
    provider: "ollama"
    model: "orca-mini"  # Phase 1: Executive summary (fast, small ~1.3GB)
    endpoint: "http://ollama.ollama.svc.cluster.local:11434"
    timeoutSeconds: 360  # 6 minutes for Ollama inference
    maxRetries: 1
    temperature: 0.03  # Extremely low temp for deterministic output, minimal variation
    maxTokens: 750  # ~500 words (1 token ≈ 0.75 words), with constraint callouts
    # phase2Model: will add larger model later for root cause analysis when degraded

# Resource limits for the single deployment
# Increased memory for cache: 64Mi -> 512Mi
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Service Account
serviceAccount:
  create: true
  name: health-reporter
  automountServiceAccountToken: true

# RBAC
rbac:
  create: true

# Node selection
# TODO: Re-enable nodeSelector once storage is properly configured for node affinity
nodeSelector: {}

# Tolerations
tolerations: []

# Pod affinity
affinity: {}

# Environment variables
env: {}

# Logging
logging:
  verbose: false

# Smoke Tests - Example sample tests to install
smokeTests: []
