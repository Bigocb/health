apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: health-reporter-controller
  labels:
    app: health-reporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: health-reporter-controller
subjects:
  - kind: ServiceAccount
    name: health-reporter
    namespace: monitoring
