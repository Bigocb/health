apiVersion: health.archipelago.ai/v1alpha1
kind: SmokeTest
metadata:
  name: kubernetes-dns
  namespace: monitoring
  labels:
    app: health-reporter
    test-type: dns
    category: infra
    subcategory: core
spec:
  type: dns
  enabled: true
  severity: high
  timeout: "5s"
  interval: "1m"
  domain: kubernetes.default
