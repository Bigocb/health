---
apiVersion: health.archipelago.ai/v1alpha1
kind: SmokeTest
metadata:
  name: coredns-external
  namespace: monitoring
  labels:
    app: health-reporter
    test-type: dns
    category: infra
    subcategory: core
    subcategory: core
spec:
  type: dns
  enabled: true
  severity: high
  timeout: "5s"
  interval: "2m"
  domain: "google.com"

---
apiVersion: health.archipelago.ai/v1alpha1
kind: SmokeTest
metadata:
  name: grafana-health
  namespace: monitoring
  labels:
    app: health-reporter
    test-type: http
    category: infra
    subcategory: observability
spec:
  type: http
  enabled: true
  severity: high
  timeout: "15s"
  interval: "2m"
  url: "http://grafana.monitoring.svc:80/api/health"
  expectedStatus: 200

---
apiVersion: health.archipelago.ai/v1alpha1
kind: SmokeTest
metadata:
  name: mimir-health
  namespace: monitoring
  labels:
    app: health-reporter
    test-type: http
    category: infra
    subcategory: observability
spec:
  type: http
  enabled: true
  severity: critical
  timeout: "10s"
  interval: "2m"
  url: "http://mimir-nginx.monitoring.svc:80/"
  method: GET
  expectedStatus: 200

---
apiVersion: health.archipelago.ai/v1alpha1
kind: SmokeTest
metadata:
  name: argocd-health
  namespace: argocd
  labels:
    app: health-reporter
    test-type: http
    category: infra
    subcategory: core
spec:
  type: http
  enabled: true
  severity: high
  timeout: "15s"
  interval: "2m"
  url: "http://argocd-server.argocd.svc:80/"
  expectedStatus: 200

---
apiVersion: health.archipelago.ai/v1alpha1
kind: SmokeTest
metadata:
  name: minio-health
  namespace: monitoring
  labels:
    app: health-reporter
    test-type: http
    category: infra
    subcategory: observability
spec:
  type: http
  enabled: false
  severity: medium
  timeout: "5s"
  interval: "5m"
  url: "http://minio.monitoring.svc:9000/minio/health/live"
  expectedStatus: 200

