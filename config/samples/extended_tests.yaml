---
apiVersion: health.archipelago.ai/v1alpha1
kind: SmokeTest
metadata:
  name: coredns-external
  namespace: monitoring
  labels:
    app: health-reporter
    test-type: dns
spec:
  type: dns
  enabled: true
  severity: high
  timeout: "5s"
  interval: "2m"
  domain: "google.com"

