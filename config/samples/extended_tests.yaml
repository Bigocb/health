# Infrastructure Health Tests
apiVersion: health.archipelago.ai/v1alpha1
kind: SmokeTest
metadata:
  name: service-discovery
  namespace: monitoring
  labels:
    app: health-reporter
    test-type: dns
    category: infra
    subcategory: core
    subcategory: core
spec:
  type: dns
  enabled: true
  severity: critical
  timeout: "5s"
  interval: "2m"
  domain: "kubernetes.default.svc.cluster.local"

