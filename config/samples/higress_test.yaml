apiVersion: health.archipelago.ai/v1alpha1
kind: SmokeTest
metadata:
  name: higress-gateway
  namespace: monitoring
  labels:
    app: health-reporter
    test-type: http
    category: infra
spec:
  type: http
  enabled: true
  severity: critical
  timeout: "10s"
  interval: "2m"
  url: "http://higress-gateway.higress-system.svc:80/"
  expectedStatus: 200